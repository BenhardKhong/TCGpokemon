services:

  app:

    build: .

    container_name: tcg_app

    volumes:
      - .:/var/www

    depends_on:
      - mysql

  nginx:

    image: nginx:latest

    container_name: tcg_nginx

    ports:
      - "8000:80"

    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.0

    container_name: tcg_mysql

    restart: always

    environment:
      MYSQL_DATABASE: tcgpokemon
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:

    image: phpmyadmin/phpmyadmin

    container_name: tcg_phpmyadmin

    restart: always

    ports:
      - "8080:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:

  mysql_data: